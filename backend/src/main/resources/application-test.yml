spring:
  datasource:
    url: jdbc:h2:mem:tms_edi_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9093
  data:
    redis:
      host: localhost
      port: 6380
  cache:
    type: simple

tms:
  storage:
    base-dir: ./target/test-edi-files
  jwt:
    secret: TestSecretKeyForJWTTokenSigningMinimum256BitsLong!TestOnly
